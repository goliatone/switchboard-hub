version: "2"

run:
  timeout: 5m
  tests: true
  modules-download-mode: readonly
  relative-path-mode: gitroot
  allow-parallel-runners: true

linters:
  default: none
  enable:
    - dupl
    - errcheck
    - funlen
    - gocyclo
    - govet
    - ineffassign
    - nestif
    - nolintlint
    - staticcheck
    - unconvert
    - unused
  settings:
    dupl:
      threshold: 120
    funlen:
      lines: 90
      statements: 45
      ignore-comments: true
    gocyclo:
      min-complexity: 15
    nestif:
      min-complexity: 5
    govet:
      enable:
        - shadow
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-unused: false
  exclusions:
    generated: strict
    warn-unused: true
    presets:
      - comments
      - common-false-positives
    rules:
      - path: _test\.go
        linters:
          - dupl
          - funlen
          - gocyclo
          - nestif

formatters:
  enable:
    - gofmt
  exclusions:
    generated: strict

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
      colors: false
