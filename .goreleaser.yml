version: 2

project_name: switchd

before:
  hooks:
    - go mod download

builds:
  - id: switchd
    main: ./cmd/switchd
    binary: switchd
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{ .Version }}
      - -X main.commit={{ .Commit }}
      - -X main.buildDate={{ .Date }}
      - -X main.buildTags=
      - -X main.gitTag={{ .Tag }}

archives:
  - id: switchd
    ids:
      - switchd
    name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end -}}
    files:
      - README.md

checksum:
  name_template: checksums.txt

snapshot:
  version_template: "{{ .Version }}-next"

changelog:
  use: github
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"
      - "^style:"
      - "^Update README"
      - "merge fix"

brews:
  - name: switchd
    repository:
      owner: goliatone
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    description: local development CLI for DNS, Caddy, and tunnel workflows on macOS.
    homepage: https://github.com/goliatone/switchboard-hub
    license: MIT
    install: |
      bin.install "switchd"
      bin.install_symlink "switchd" => "sbd"
    test: |
      system "#{bin}/switchd", "version"
      system "#{bin}/sbd", "version"

nfpms:
  - id: switchd
    file_name_template: >-
      {{- .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else }}{{ .Arch }}{{ end -}}
    bindir: /usr/local/bin/
    maintainer: goliatone <switchd@goliat.one>
    description: local development CLI for DNS, Caddy, and tunnel workflows on macOS.
    homepage: https://github.com/goliatone/switchboard-hub
    license: MIT
    formats:
      - deb
      - rpm
    contents:
      - src: /usr/local/bin/switchd
        dst: /usr/local/bin/sbd
        type: symlink
